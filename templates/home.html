<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIFAKE AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
color:white;
}
.navbar{background:rgba(0,0,0,.3);backdrop-filter:blur(10px);}
.hero{padding:100px 20px;text-align:center;}
.hero h1{font-size:3rem;font-weight:bold;}
.hero p{font-size:1.2rem;color:#ddd;}
.upload-card{
background:white;
color:#222;
border-radius:20px;
padding:35px;
max-width:700px;
margin:40px auto;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}
.drop{
border:2px dashed #0d6efd;
padding:40px;
border-radius:15px;
}
footer{
background:#0b1120;
padding:20px;
text-align:center;
margin-top:50px;
}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand fw-bold" href="#">CIFAKE AI</a>

<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="/home">Home</a></li>
<li class="nav-item"><a class="nav-link" href="/login">Logout</a></li>
</ul>
</div>
</nav>

<section class="hero">
<h1>AI Image Classification</h1>
<p>Detect Real and AI Generated Images using Deep Learning and Explainable AI.</p>

<div class="upload-card">

<h3 class="mb-4">Upload an Image</h3>

<form action="/predict" method="POST" enctype="multipart/form-data">

<div class="drop mb-4">
<input class="form-control" type="file" name="files" required>
<p class="mt-3 text-muted">Supported: JPG, PNG, JPEG (Max 500KB)</p>
</div>

<button class="btn btn-primary btn-lg w-100">Predict Image</button>

</form>

</div>

</section>

<footer>
© 2026 CIFAKE AI. All Rights Reserved.<br>
Designed & Developed by <strong>Gundeboina Anil</strong>
</footer>

</body>
</html>
