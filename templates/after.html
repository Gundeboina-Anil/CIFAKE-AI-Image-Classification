<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediction Result</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:linear-gradient(135deg,#0f172a,#1e3a8a);
font-family:Arial,sans-serif;
color:white;
margin:0;
}
.navbar{
background:rgba(0,0,0,.35);
backdrop-filter:blur(10px);
}
.hero{
padding:70px 20px 30px;
text-align:center;
}
.card-box{
background:#fff;
color:#222;
max-width:900px;
margin:auto;
border-radius:20px;
padding:35px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}
.result{
font-size:28px;
font-weight:bold;
color:#0d6efd;
}
.preview{
max-width:100%;
border-radius:15px;
border:3px solid #0d6efd;
margin-top:20px;
}
footer{
margin-top:50px;
padding:20px;
text-align:center;
background:#0b1120;
}
</style>

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand fw-bold" href="/home">CIFAKE AI</a>

<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="/home">Home</a></li>
<li class="nav-item"><a class="nav-link" href="/login">Logout</a></li>
</ul>

</div>
</nav>

<section class="hero">

<h1>Prediction Result</h1>
<p>Your uploaded image has been analyzed successfully.</p>

<div class="card-box">

<h3 class="mb-4">Classification Result</h3>

<div class="alert alert-primary">
<h2 class="result">{{ msg|safe }}</h2>
</div>

<img src="data:image/png;base64, {{ img }}" class="preview" alt="Prediction Image">

<div class="mt-4">
<a href="{{ url_for('home') }}" class="btn btn-primary btn-lg">
Try Another Image
</a>
</div>

</div>

</section>

<footer>
© 2026 CIFAKE AI. All Rights Reserved.<br>
Designed & Developed by <strong>Gundeboina Anil</strong>
</footer>

</body>
</html>
