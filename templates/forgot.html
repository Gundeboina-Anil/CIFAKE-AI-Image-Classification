<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
font-family:Arial,sans-serif;
}

.card{
width:450px;
padding:40px;
border:none;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,.3);
}

.logo{
text-align:center;
font-size:32px;
font-weight:bold;
color:#0d6efd;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:gray;
margin-bottom:25px;
}
</style>

</head>
<body>

<div class="card">

<div class="logo">CIFAKE AI</div>

<p class="subtitle">
Recover your Username and Password
</p>

<form action="/recover" method="GET">

<div class="mb-3">
<label>Email Address</label>
<input
type="email"
name="email"
class="form-control"
placeholder="Enter Registered Email"
required>
</div>

<button
type="submit"
class="btn btn-primary w-100">
Recover Account
</button>

</form>

<br>

<div class="text-center">
<a href="/login">Back to Login</a>
</div>

</div>

</body>
</html>
