<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIFAKE AI - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
font-family:Arial,sans-serif;
}

.login-card{
width:900px;
max-width:95%;
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 15px 35px rgba(0,0,0,.35);
}

.left{
background:#0d6efd;
color:white;
padding:50px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100%;
}

.left h1{
font-weight:bold;
}

.left p{
text-align:center;
}

.right{
padding:50px;
}

.form-control{
height:50px;
}

.btn-login{
height:50px;
font-size:18px;
}

.signup{
text-align:center;
margin-top:20px;
}
</style>

</head>

<body>

<div class="login-card">

<div class="row g-0">

<div class="col-md-5 left">

<h1>CIFAKE AI</h1>

<p>
Image Classification and Explainable Identification of AI Generated Images.
</p>

</div>

<div class="col-md-7 right">

<h2 class="mb-4">Sign In</h2>

<form method="GET" action="/signin">

<div class="mb-3">
<label class="form-label">Username</label>
<input
type="text"
name="user"
class="form-control"
placeholder="Enter Username"
required>
</div>

<div class="mb-4">
<label class="form-label">Password</label>
<input
type="password"
name="password"
class="form-control"
placeholder="Enter Password"
required>
</div>

<button
type="submit"
class="btn btn-primary btn-login w-100">
Login
</button>

<div class="signup">
Don't have an account?
<a href="/logon">Create Account</a>
<br><br>
<a href="/forgot">Forgot Password?</a>
</div>

</form>

</div>

</div>

</div>

</body>
</html>
