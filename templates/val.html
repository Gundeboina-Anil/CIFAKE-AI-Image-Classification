<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Verification</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
font-family:Arial,sans-serif;
}
.card{
width:420px;
border:none;
border-radius:20px;
padding:35px;
box-shadow:0 15px 35px rgba(0,0,0,.35);
}
.logo{
font-size:30px;
font-weight:bold;
color:#0d6efd;
text-align:center;
}
.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
}
</style>
</head>
<body>

<div class="card">

<div class="logo">CIFAKE AI</div>
<p class="subtitle">OTP Verification</p>

<form action="/predict_lo" method="POST">

<div class="mb-3">
<label class="form-label">Enter OTP</label>
<input type="text" class="form-control form-control-lg" name="message" placeholder="Enter OTP" required>
</div>

<button class="btn btn-primary btn-lg w-100" type="submit">Verify OTP</button>

<a href="/" class="btn btn-outline-secondary w-100 mt-3">Back to Home</a>

</form>

</div>

</body>
</html>
