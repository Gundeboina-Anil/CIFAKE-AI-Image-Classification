<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIFAKE AI - Sign Up</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
margin:0;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:30px;
}

.signup-card{
width:1000px;
max-width:95%;
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 15px 35px rgba(0,0,0,.35);
}

.left{
background:#0d6efd;
color:white;
padding:45px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100%;
}

.left h1{
font-weight:bold;
}

.right{
padding:40px;
}

.form-control{
height:48px;
}

.btn-register{
height:50px;
font-size:18px;
}

.footer-link{
text-align:center;
margin-top:20px;
}
</style>

</head>

<body>

<div class="signup-card">

<div class="row g-0">

<div class="col-md-5 left">

<h1>CIFAKE AI</h1>

<p class="text-center">
Create your account to access the AI Image Detection platform.
</p>

</div>

<div class="col-md-7 right">

<h2 class="mb-4">Create Account</h2>

<form method="GET" action="/signup">

<div class="mb-3">
<input type="text" class="form-control" name="user"
placeholder="Username"
pattern="[A-Za-z].{5,}"
required>
</div>

<div class="mb-3">
<input type="text" class="form-control" name="name"
placeholder="Full Name"
required>
</div>

<div class="mb-3">
<input type="email" class="form-control" name="email"
placeholder="Email Address"
required>
</div>

<div class="mb-3">
<input type="text" class="form-control" name="mobile"
placeholder="Mobile Number"
pattern="[6-9]{1}[0-9]{9}"
required>
</div>

<div class="mb-3">
<input type="password" class="form-control" name="password"
placeholder="Password"
pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
required>
</div>

<div class="form-check mb-4">
<input class="form-check-input" type="checkbox" required id="agree">
<label class="form-check-label" for="agree">
I agree to the Terms and Conditions
</label>
</div>

<button class="btn btn-primary btn-register w-100" type="submit">
Register
</button>

<div class="footer-link">
Already have an account?
<a href="/login">Sign In</a>
</div>

</form>

</div>

</div>

</div>

</body>
</html>
